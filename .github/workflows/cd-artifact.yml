name: CD Deploy Artifact

on:
  workflow_run:
    workflows: ["CI Completed"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  deploy-artifact:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: self-hosted

    steps:
      # Download artifact from the triggering CI Completed run
      - name: Download build artifact from CI Completed
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: main-build-package
          path: C:\deploy\artifact
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # Fallback note for manual runs
      - name: Manual run note
        if: ${{ github.event_name == 'workflow_dispatch' }}
        shell: powershell
        run: |
          Write-Host "Manual trigger detected."
          Write-Host "Please make sure artifact files already exist in C:\deploy\artifact before running this workflow manually."

      # Stop the currently running application if it exists
      - name: Stop current app
        shell: powershell
        run: |
          $pidFile = "C:\deploy\app\app.pid"
          $port = 5050
          $taskName = "DemoSonarApp-Run"

          if (Test-Path $pidFile) {
            $appPid = Get-Content $pidFile
            if ($appPid) {
              Stop-Process -Id $appPid -Force -ErrorAction SilentlyContinue
            }
            Remove-Item $pidFile -Force -ErrorAction SilentlyContinue
          }

          cmd /c "schtasks /End /TN $taskName" | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Task $taskName was not running or did not exist. Continuing..."
            $global:LASTEXITCODE = 0
          }

          cmd /c "schtasks /Delete /TN $taskName /F" | Out-Null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "Task $taskName did not exist. Continuing..."
            $global:LASTEXITCODE = 0
          }

          # Extra cleanup: kill any process still listening on deploy port.
          $listeningPids = Get-NetTCPConnection -LocalPort $port -State Listen -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty OwningProcess -Unique
          foreach ($listeningPid in $listeningPids) {
            if ($listeningPid -and $listeningPid -ne 0) {
              Stop-Process -Id $listeningPid -Force -ErrorAction SilentlyContinue
            }
          }
          $global:LASTEXITCODE = 0

      # Replace deployed files with the new artifact
      - name: Copy new artifact to deployment folder
        shell: powershell
        run: |
          $artifactPath = "C:\deploy\artifact"
          $appPath = "C:\deploy\app"

          if (!(Test-Path $artifactPath)) {
            Write-Error "Artifact path does not exist: $artifactPath"
            exit 1
          }

          # Artifact can be extracted either directly in $artifactPath or in a nested folder.
          $artifactDll = Get-ChildItem -Path $artifactPath -Filter "DemoSonarApp.dll" -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $artifactDll) {
            Write-Error "Could not find DemoSonarApp.dll under $artifactPath"
            Get-ChildItem -Path $artifactPath -Recurse -Force | Select-Object FullName
            exit 1
          }
          $sourceRoot = Split-Path -Parent $artifactDll.FullName

          if (Test-Path $appPath) {
            Remove-Item "$appPath\*" -Recurse -Force -ErrorAction SilentlyContinue
          } else {
            New-Item -ItemType Directory -Path $appPath | Out-Null
          }

          Copy-Item "$sourceRoot\*" $appPath -Recurse -Force

      # Start the application from the published artifact
      - name: Start application detached
        shell: powershell
        run: |
          $appPath = "C:\deploy\app"
          $dllPath = Join-Path $appPath "DemoSonarApp.dll"
          $pidFile = Join-Path $appPath "app.pid"
          $stdoutFile = Join-Path $appPath "app.log"
          $stderrFile = Join-Path $appPath "app-error.log"
          $taskName = "DemoSonarApp-Run"

          if (!(Test-Path $dllPath)) {
            Write-Error "Application DLL not found: $dllPath"
            exit 1
          }

          if (Test-Path $stdoutFile) { Remove-Item $stdoutFile -Force -ErrorAction SilentlyContinue }
          if (Test-Path $stderrFile) { Remove-Item $stderrFile -Force -ErrorAction SilentlyContinue }

          $taskCommand = "cmd /c cd /d `"$appPath`" && dotnet `"$dllPath`" --urls http://localhost:5050 > app.log 2> app-error.log"
          cmd /c "schtasks /Create /TN $taskName /SC ONCE /ST 23:59 /TR `"$taskCommand`" /RU SYSTEM /F"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to create scheduled task."
            exit 1
          }

          cmd /c "schtasks /Run /TN $taskName"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to run scheduled task."
            exit 1
          }

          Start-Sleep -Seconds 5
          $listener = Get-NetTCPConnection -LocalPort 5050 -State Listen -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $listener) {
            Write-Error "Application did not open TCP port 5050."
            if (Test-Path $stderrFile) {
              Get-Content $stderrFile -Tail 100
            }
            exit 1
          }
          $listener.OwningProcess | Out-File $pidFile -Encoding ascii

      - name: Debug running process
        shell: powershell
        run: |
          Get-Process dotnet -ErrorAction SilentlyContinue

      # Wait and verify the application is running
      - name: Verify deployed app
        shell: powershell
        run: |
          $url = "http://localhost:5050/weatherforecast"
          $maxAttempts = 12

          for ($i = 1; $i -le $maxAttempts; $i++) {
            try {
              $response = Invoke-WebRequest -Uri $url -UseBasicParsing -TimeoutSec 5 -Proxy $null
              if ($response.StatusCode -eq 200) {
                Write-Host "Application is reachable."
                exit 0
              }
            }
            catch {
              Write-Host "Attempt $i failed. Retrying in 5 seconds..."
            }

            Start-Sleep -Seconds 5
          }

          Write-Error "Application is not reachable after deployment."
          exit 1

      # Add deployment summary
      - name: Add summary
        if: always()
        shell: powershell
        run: |
          "## CD Deploy Artifact" >> $env:GITHUB_STEP_SUMMARY
          "- Trigger: ${{ github.event_name }}" >> $env:GITHUB_STEP_SUMMARY
          "- Source workflow: CI Completed" >> $env:GITHUB_STEP_SUMMARY
          "- Artifact: main-build-package" >> $env:GITHUB_STEP_SUMMARY
          "- Deployment target: self-hosted runner" >> $env:GITHUB_STEP_SUMMARY
          "- URL: http://localhost:5050/weatherforecast" >> $env:GITHUB_STEP_SUMMARY
          "- Verification: post-deployment endpoint check" >> $env:GITHUB_STEP_SUMMARY
          "- Status: deployment finished" >> $env:GITHUB_STEP_SUMMARY
